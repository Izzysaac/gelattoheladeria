<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
    <!-- Cabeza -->
    <circle cx="14" cy="7" r="2" fill="currentColor" />
    <g transform="rotate(30)">
        <!-- Cuerpo  -->
        <rect x="15" y="2" rx="0.5" ry="0.5" width="1.5" height="6"/>
        <!-- Mochila -->
        <rect x="7.5" y="2" rx="1" width="5" height="5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </g>
    <!-- Pierna -->
    <g transform="rotate(-44)">
        <circle
            cx="-8.5"
            cy="17.6"
            r="5.8"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-dasharray="5 31"
        />
    </g>
    <!-- Volante -->
    <g transform="rotate(120)">
        <circle
            cx="-4.4"
            cy="-19.6"
            r="8"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-dasharray="4 100"
        />
    </g>

    <!-- Ruedas bicicleta -->
    <circle cx="6.4" cy="19" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <circle cx="17.6" cy="19" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
    </svg>